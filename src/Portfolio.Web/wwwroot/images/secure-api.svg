<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="720" cy="60" r="120" fill="#283593" opacity="0.3" />
  <circle cx="80" cy="380" r="100" fill="#0D47A1" opacity="0.4" />
  <!-- App window frame -->
  <rect x="60" y="60" width="500" height="330" rx="12" ry="12" fill="#FFFFFF" opacity="0.08" />
  <!-- Window title bar -->
  <rect x="60" y="60" width="500" height="40" rx="12" ry="12" fill="#FFFFFF" opacity="0.12" />
  <circle cx="85" cy="80" r="6" fill="#FF5F57" />
  <circle cx="105" cy="80" r="6" fill="#FEBC2E" />
  <circle cx="125" cy="80" r="6" fill="#28C840" />
  <text x="300" y="85" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.7">SecureAPI Framework — Security Dashboard</text>
  <!-- Security checklist area -->
  <rect x="80" y="110" width="460" height="270" rx="8" fill="#FFFFFF" opacity="0.04" />
  <!-- OWASP section header -->
  <rect x="90" y="118" width="200" height="26" rx="5" fill="#FFFFFF" opacity="0.1" />
  <text x="190" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#90CAF9" font-weight="bold">OWASP Top Ten Status</text>
  <!-- Checklist items -->
  <rect x="97" y="150" width="12" height="12" rx="2" fill="#4CAF50" opacity="0.9" />
  <text x="116" y="161" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">A01 Broken Access Control — resource-based auth ✓</text>
  <rect x="97" y="170" width="12" height="12" rx="2" fill="#4CAF50" opacity="0.9" />
  <text x="116" y="181" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">A02 Cryptographic Failures — AES-256 + TLS 1.3 ✓</text>
  <rect x="97" y="190" width="12" height="12" rx="2" fill="#4CAF50" opacity="0.9" />
  <text x="116" y="201" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">A03 Injection — parameterised + input sanitisation ✓</text>
  <rect x="97" y="210" width="12" height="12" rx="2" fill="#4CAF50" opacity="0.9" />
  <text x="116" y="221" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">A05 Security Misconfiguration — hardened headers ✓</text>
  <rect x="97" y="230" width="12" height="12" rx="2" fill="#4CAF50" opacity="0.9" />
  <text x="116" y="241" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">A07 Auth Failures — JWT algorithm pinning ✓</text>
  <rect x="97" y="250" width="12" height="12" rx="2" fill="#4CAF50" opacity="0.9" />
  <text x="116" y="261" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">A08 Data Integrity — CI dependency scanning ✓</text>
  <!-- JWT section header -->
  <rect x="90" y="276" width="155" height="26" rx="5" fill="#FFFFFF" opacity="0.1" />
  <text x="167" y="293" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#90CAF9" font-weight="bold">JWT Configuration</text>
  <!-- JWT details -->
  <text x="97" y="316" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">Algorithm: HS256  Key: 256-bit  Expiry: 60 min</text>
  <text x="97" y="334" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">Rate limit: 100 req/min  Refresh tokens: enabled</text>
  <!-- Right panel -->
  <text x="595" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">SecureAPI</text>
  <text x="595" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#90CAF9">ASP.NET Core Security Baseline</text>
  <!-- Tech chips -->
  <rect x="538" y="145" width="65" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="570" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">JWT / OAuth2</text>
  <rect x="612" y="145" width="55" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="639" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">OWASP</text>
  <rect x="538" y="174" width="75" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="575" y="189" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Rate Limiting</text>
  <rect x="622" y="174" width="45" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="644" y="189" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Polly</text>
  <!-- Features list -->
  <text x="530" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#90CAF9" font-weight="bold">Built-In Protections</text>
  <circle cx="538" cy="240" r="3" fill="#64B5F6" />
  <text x="547" y="244" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Algorithm pinning</text>
  <circle cx="538" cy="258" r="3" fill="#64B5F6" />
  <text x="547" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Resource-based authz</text>
  <circle cx="538" cy="276" r="3" fill="#64B5F6" />
  <text x="547" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Structured sec logging</text>
  <circle cx="538" cy="294" r="3" fill="#64B5F6" />
  <text x="547" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">CI vuln scanning</text>
  <circle cx="538" cy="312" r="3" fill="#64B5F6" />
  <text x="547" y="316" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Threat modelling</text>
</svg>
