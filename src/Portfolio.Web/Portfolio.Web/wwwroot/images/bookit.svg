  <text x="547" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Online booking portal</text>
  <circle cx="538" cy="286" r="3" fill="#64B5F6" />
  <text x="547" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Real-time availability</text>
  <circle cx="538" cy="304" r="3" fill="#64B5F6" />
  <text x="547" y="308" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Dark / light mode</text>
  <circle cx="538" cy="322" r="3" fill="#64B5F6" />
  <text x="547" y="326" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Customer management</text>
  <circle cx="538" cy="340" r="3" fill="#64B5F6" />
  <text x="547" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">SMS notifications</text>
