  <text x="340" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Today 11:30</text>
  <rect x="440" y="253" width="50" height="16" rx="8" fill="#FFB74D" opacity="0.8" />
  <text x="465" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFF">Pending</text>
  <rect x="195" y="278" width="350" height="24" rx="3" fill="#FFFFFF" opacity="0.05" />
  <text x="215" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF">Mike Taylor</text>
  <text x="340" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Today 14:00</text>
