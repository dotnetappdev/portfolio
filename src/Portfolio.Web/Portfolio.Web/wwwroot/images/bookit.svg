  <rect x="195" y="112" width="110" height="60" rx="8" fill="#FFFFFF" opacity="0.12" />
  <text x="250" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Today</text>
  <text x="250" y="157" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">24</text>
  <rect x="320" y="112" width="110" height="60" rx="8" fill="#FFFFFF" opacity="0.12" />
  <text x="375" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Pending</text>
  <text x="375" y="157" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#64B5F6">8</text>
  <rect x="445" y="112" width="100" height="60" rx="8" fill="#FFFFFF" opacity="0.12" />
