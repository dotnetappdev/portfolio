  <text x="557" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Blazor</text>
  <rect x="594" y="145" width="75" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="631" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">ASP.NET Core</text>
  <rect x="530" y="174" width="75" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="567" y="189" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">SQL Server</text>
  <rect x="614" y="174" width="55" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="641" y="189" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">MudBlazor</text>
  <rect x="530" y="203" width="65" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="562" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">EF Core</text>
  <rect x="604" y="203" width="65" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="636" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">C# .NET 10</text>
