  <rect x="75" y="158" width="90" height="28" rx="6" fill="#FFFFFF" opacity="0.08" />
  <text x="120" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Bookings</text>
  <rect x="75" y="196" width="90" height="28" rx="6" fill="#FFFFFF" opacity="0.08" />
  <text x="120" y="214" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Calendar</text>
  <rect x="75" y="234" width="90" height="28" rx="6" fill="#FFFFFF" opacity="0.08" />
  <text x="120" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Customers</text>
  <!-- Main content area -->
