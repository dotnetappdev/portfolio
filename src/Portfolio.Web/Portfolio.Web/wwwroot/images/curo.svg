<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A148C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="700" cy="50" r="130" fill="#9C27B0" opacity="0.25" />
  <circle cx="100" cy="400" r="110" fill="#4A148C" opacity="0.4" />
  <!-- App window frame -->
  <rect x="55" y="55" width="510" height="340" rx="12" ry="12" fill="#FFFFFF" opacity="0.07" />
  <rect x="55" y="55" width="510" height="40" rx="12" ry="12" fill="#FFFFFF" opacity="0.1" />
  <circle cx="80" cy="75" r="6" fill="#FF5F57" />
  <circle cx="100" cy="75" r="6" fill="#FEBC2E" />
  <circle cx="120" cy="75" r="6" fill="#28C840" />
  <text x="300" y="80" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.7">Curo — Care Management Platform</text>
  <!-- Top nav -->
  <rect x="55" y="95" width="510" height="35" fill="#FFFFFF" opacity="0.06" />
  <text x="80" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF">Patients</text>
  <text x="145" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#CE93D8">Care Plans</text>
  <text x="225" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.6">Reports</text>
  <text x="290" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.6">Settings</text>
  <!-- Patient list panel -->
  <rect x="55" y="130" width="180" height="265" fill="#FFFFFF" opacity="0.04" />
  <text x="75" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#CE93D8" font-weight="bold">PATIENTS</text>
  <!-- Patient items -->
  <rect x="65" y="160" width="160" height="34" rx="6" fill="#FFFFFF" opacity="0.12" />
  <circle cx="85" cy="177" r="10" fill="#CE93D8" opacity="0.6" />
  <text x="100" y="173" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF">Margaret L.</text>
  <text x="100" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#CE93D8" opacity="0.8">Active Care Plan</text>
  <rect x="65" y="200" width="160" height="34" rx="6" fill="#FFFFFF" opacity="0.06" />
  <circle cx="85" cy="217" r="10" fill="#9C27B0" opacity="0.6" />
  <text x="100" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF">Robert K.</text>
  <text x="100" y="226" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.5">Review Due</text>
  <rect x="65" y="240" width="160" height="34" rx="6" fill="#FFFFFF" opacity="0.06" />
  <circle cx="85" cy="257" r="10" fill="#7B1FA2" opacity="0.6" />
  <text x="100" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF">Patricia M.</text>
  <text x="100" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.5">Care Plan Active</text>
  <!-- Main content -->
  <!-- Care plan card -->
  <rect x="248" y="130" width="308" height="265" rx="8" fill="#FFFFFF" opacity="0.05" />
  <text x="268" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Margaret L. — Care Plan</text>
  <text x="268" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#CE93D8">Last reviewed: 12 Nov 2025</text>
  <!-- Status chips -->
  <rect x="268" y="180" width="60" height="20" rx="10" fill="#81C784" opacity="0.7" />
  <text x="298" y="193" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFF">Active</text>
  <rect x="336" y="180" width="80" height="20" rx="10" fill="#CE93D8" opacity="0.4" />
  <text x="376" y="193" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFF">High Priority</text>
  <!-- Vitals section -->
  <text x="268" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#CE93D8">VITALS OVERVIEW</text>
  <rect x="268" y="228" width="70" height="50" rx="6" fill="#FFFFFF" opacity="0.08" />
  <text x="303" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#CE93D8">72</text>
  <text x="303" y="265" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">BPM</text>
  <rect x="348" y="228" width="70" height="50" rx="6" fill="#FFFFFF" opacity="0.08" />
  <text x="383" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#81C784">120</text>
  <text x="383" y="265" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">SBP</text>
  <rect x="428" y="228" width="70" height="50" rx="6" fill="#FFFFFF" opacity="0.08" />
  <text x="463" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFB74D">36.8</text>
  <text x="463" y="265" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">°C</text>
  <!-- Tasks -->
  <text x="268" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#CE93D8">CARE TASKS</text>
  <rect x="268" y="306" width="18" height="18" rx="3" fill="none" stroke="#81C784" stroke-width="2" />
  <text x="268" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.5">✓</text>
  <text x="294" y="319" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Morning medication administered</text>
  <rect x="268" y="330" width="18" height="18" rx="3" fill="none" stroke="#CE93D8" stroke-width="2" />
  <text x="294" y="343" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Afternoon physio session</text>
  <rect x="268" y="354" width="18" height="18" rx="3" fill="none" stroke="#CE93D8" stroke-width="2" />
  <text x="294" y="367" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Evening vitals check</text>
  <!-- Right info panel -->
  <text x="610" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">Curo</text>
  <text x="610" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#CE93D8">Care Management Platform</text>
  <!-- Tech chips -->
  <rect x="549" y="143" width="75" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="586" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">ASP.NET Core</text>
  <rect x="633" y="143" width="55" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="660" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Blazor</text>
  <rect x="549" y="172" width="75" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="586" y="187" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">SQL Server</text>
  <rect x="633" y="172" width="55" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="660" y="187" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">Azure</text>
  <rect x="549" y="201" width="65" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="581" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">EF Core</text>
  <rect x="623" y="201" width="65" height="22" rx="11" fill="#FFFFFF" opacity="0.15" />
  <text x="655" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#FFFFFF">MudBlazor</text>
  <!-- Features list -->
  <text x="549" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#CE93D8" font-weight="bold">Key Features</text>
  <circle cx="557" cy="266" r="3" fill="#CE93D8" />
  <text x="566" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Care plan management</text>
  <circle cx="557" cy="284" r="3" fill="#CE93D8" />
  <text x="566" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Patient tracking</text>
  <circle cx="557" cy="302" r="3" fill="#CE93D8" />
  <text x="566" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Clinical workflows</text>
  <circle cx="557" cy="320" r="3" fill="#CE93D8" />
  <text x="566" y="324" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Real-time dashboards</text>
  <circle cx="557" cy="338" r="3" fill="#CE93D8" />
  <text x="566" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">Azure cloud hosting</text>
</svg>
