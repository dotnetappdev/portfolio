services:
  portfolio-api:
    build:
      context: ./src
      dockerfile: Portfolio.Api/Dockerfile
    container_name: portfolio-api
    ports:
      - "5008:8080"
    environment:
      - DatabaseProvider=Sqlite
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/portfolio-api.db
      - SeedData=true
      - Jwt__Key=${JWT_KEY:?Please set JWT_KEY in your .env file (min 32 characters)}
      - Jwt__Issuer=Portfolio.Api
      - Jwt__Audience=Portfolio.Web
      - DefaultAdmin__Email=${ADMIN_EMAIL:-admin@portfolio.com}
      - DefaultAdmin__Password=${ADMIN_PASSWORD:-Admin@123456!}
      - AllowedOrigins=${ALLOWED_ORIGINS:-http://localhost:5072}
    volumes:
      - api-data:/app/data
    restart: unless-stopped

  portfolio-web:
    build:
      context: ./src
      dockerfile: Portfolio.Web/Dockerfile
    container_name: portfolio-web
    ports:
      - "5072:8080"
    environment:
      - BaseApiUrl=${BASE_API_URL:-http://portfolio-api:8080/}
    restart: unless-stopped
    depends_on:
      - portfolio-api

volumes:
  api-data:
