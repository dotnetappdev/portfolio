name: Deploy Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy Portfolio API
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        working-directory: src/Portfolio.Api
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore src/Portfolio.Api/Portfolio.Api.csproj

      - name: Run database migrations
        working-directory: src/Portfolio.Api
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.API_DB_CONNECTION_STRING }}
        run: dotnet ef database update --configuration Release

      - name: Publish and deploy API
        shell: bash
        run: |
          dotnet publish src/Portfolio.Api/Portfolio.Api.csproj \
            --configuration Release \
            /p:PublishProfile=WebDeploy \
            "/p:MSDeployServiceURL=${{ secrets.API_MSDEPLOY_URL }}" \
            "/p:DeployIisAppPath=${{ secrets.API_DEPLOY_IISAPP_PATH }}" \
            "/p:UserName=${{ secrets.API_MSDEPLOY_USERNAME }}" \
            "/p:Password=${{ secrets.API_MSDEPLOY_PASSWORD }}" \
            /p:AllowUntrustedCertificate=true

  deploy-web:
    name: Deploy Portfolio Web
    runs-on: windows-latest
    needs: deploy-api
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Portfolio.Web/Portfolio.Web.csproj

      - name: Publish and deploy Web
        shell: bash
        run: |
          dotnet publish src/Portfolio.Web/Portfolio.Web.csproj \
            --configuration Release \
            /p:PublishProfile=WebDeploy \
            "/p:MSDeployServiceURL=${{ secrets.WEB_MSDEPLOY_URL }}" \
            "/p:DeployIisAppPath=${{ secrets.WEB_DEPLOY_IISAPP_PATH }}" \
            "/p:UserName=${{ secrets.WEB_MSDEPLOY_USERNAME }}" \
            "/p:Password=${{ secrets.WEB_MSDEPLOY_PASSWORD }}" \
            /p:AllowUntrustedCertificate=true
